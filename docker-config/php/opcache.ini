; ============================================================
;  Visueco — Tuning OPcache untuk performa (lokal & produksi)
;  Mengatasi lambatnya bind-mount Docker Desktop di Windows:
;  file PHP di-cache permanen dan tidak di-stat ulang tiap request.
; ============================================================

opcache.enable=1
opcache.enable_cli=0

; Memori & kapasitas — cukup untuk Laravel + vendor.
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000

; KUNCI performa di bind-mount Windows:
; jangan cek timestamp file tiap request (mahal di mount lambat).
; Setelah ubah kode PHP, jalankan: docker exec visueco-app php artisan opcache:clear
; atau restart container.
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments=1

; JIT untuk mempercepat eksekusi.
opcache.jit=tracing
opcache.jit_buffer_size=64M

; realpath cache besar — penting agar resolve path vendor/ tidak lambat.
realpath_cache_size=8192K
realpath_cache_ttl=600
