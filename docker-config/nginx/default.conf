# ============================================================
#  Visueco - Virtual Host Nginx
#  Meneruskan request HTTP -> PHP-FPM (visueco-app:9000)
# ============================================================

server {
    # Port internal container
    listen 80;
    server_name localhost;

    # Root direktori publik standar Laravel
    root /var/www/public;
    index index.php index.html;

    # Charset & ukuran upload
    charset utf-8;
    client_max_body_size 20M;

    # --------------------------------------------------------
    #  Routing ramah Laravel
    # --------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Abaikan favicon & robots agar tidak mengotori log
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # --------------------------------------------------------
    #  Eksekusi skrip PHP -> PHP-FPM
    # --------------------------------------------------------
    location ~ \.php$ {
        # Teruskan ke service PHP-FPM dalam network bridge
        fastcgi_pass visueco-app:9000;
        fastcgi_index index.php;

        # Parameter FastCGI standar
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Hardening dasar
        fastcgi_hide_header X-Powered-By;
    }

    # --------------------------------------------------------
    #  Blokir akses ke file tersembunyi (.env, .git, dll)
    # --------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Log
    error_log  /var/log/nginx/visueco_error.log;
    access_log /var/log/nginx/visueco_access.log;
}
